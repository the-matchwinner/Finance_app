# Server
server.port=8081

# PostgreSQL DB Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_db
spring.datasource.username=postgres
spring.datasource.password=database

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Settings
# A strong 256-bit base64-encoded secret key
jwt.secret=4qhq8IrX+Z9eU2rMvS2A1D7jFp2xW8tC6oY9L4aZ5xE=
# Expiration: 24 hours (86400000 ms)
jwt.expirationMs=86400000

# OpenAI API Key (Required for AI Insights)
openai.api.key=sk-placeholder-key-replace-me

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Setu Account Aggregator Integration (Sandbox)
setu.client-id=
setu.client-secret=
setu.product-instance-id=
setu.base-url=https://fip-bridge-sandbox.setu.co